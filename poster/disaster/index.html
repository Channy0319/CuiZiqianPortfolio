        <p class="description">为了强化灾难题材带来的紧张氛围，整体采用破裂墙体作为画面边框，模拟灾难现场的空间破坏感。标题加入了金属纹理效果，与矿井、爆炸、救援等电影元素形成呼应，使专题在首页浏览时能够快速建立灾难电影的危机感和视觉冲击力。</p>
